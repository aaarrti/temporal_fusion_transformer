[project]
name = "temporal_fusion_transformer"
version = "0.0.1"
description = "TF2 and Flax re-write of Temporal Fusion Transformer model."
readme = "Readme.md"
requires-python = ">=3.8"
authors = [
    { name = "Artem Sereda", email = "a.sereda@sevensenders.com" },
    { name = "Artem Sereda", email = "artem.sereda.tub@gmail.com" },
]
maintainers = [
    { name = "Artem Sereda", email = "a.sereda@sevensenders.com" },
    { name = "Artem Sereda", email = "artem.sereda.tub@gmail.com" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
]
dependencies = [
    "tensorflow>=2.10.0; sys_platform == 'linux'",
    "tensorflow_macos>=2.10.0; sys_platform == 'darwin'",
    "jaxtyping",
    "keras_pbar",
    "scikit_learn",
    "pandas",
    "matplotlib",
    "matplotx",
]
[project.optional-dependencies]
flax = [
    "jax",
    "jaxlib",
    "flax",
    "tf2jax",
    "optax",
    "jmp",
    "clu",
    "msgpack",
    "orbax",
    "orbax_checkpoint"
]
tests = [
    "temporal_fusion_transformer[flax]",
    "pytest",
    "chex"
]
[project.urls]
"Homepage" = "https://github.com/aaarrti/temporal_fusion_transformer"


[build-system]
requires = ["flit-core >= 3.4,<4"]
build-backend = "flit_core.buildapi"